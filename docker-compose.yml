version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: atlas_fleet_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: atlasfleet
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: atlas_fleet_backend
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/atlasfleet?schema=public"
      PORT: 3000
      JWT_SECRET: "super-secret-cosmic-key-2026"
      ADMIN_JWT_EXPIRES_IN: "7d"
      TELEGRAM_BOT_TOKEN: "8766839286:AAEqWXCUPF3wHrXci7fIH0KqCiSFi98UKbQ"
      TELEGRAM_BOT_USERNAME: "atlas_fllet_bot"
    depends_on:
      - db

  bot:
    build:
      context: .
      dockerfile: docker/bot.Dockerfile
    container_name: atlas_fleet_bot
    restart: always
    environment:
      DATABASE_URL: "postgresql://postgres:postgrespassword@db:5432/atlasfleet?schema=public"
      TELEGRAM_BOT_TOKEN: "8766839286:AAEqWXCUPF3wHrXci7fIH0KqCiSFi98UKbQ"
      TELEGRAM_BOT_USERNAME: "atlas_fllet_bot"
      API_URL: "http://backend:3000/api"
    depends_on:
      - backend

  frontend-miniapp:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: atlas_fleet_frontend
    restart: always
    ports:
      - "5173:80"
    depends_on:
      - backend

  admin-panel:
    build:
      context: .
      dockerfile: docker/admin.Dockerfile
    container_name: atlas_fleet_admin
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: atlas_fleet_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend-miniapp
      - admin-panel

volumes:
  pgdata:
