name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgrespassword
          POSTGRES_DB: atlasfleet_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: 18
        cache: 'npm'

    - name: Install Monorepo Dependencies
      run: npm install

    - name: Build Shared Types
      run: npm run --prefix packages/shared-types build

    - name: Generate Prisma Client
      run: npm run --prefix apps/backend prisma:generate
      env:
        DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/atlasfleet_test?schema=public"

    - name: Compile Monorepo
      run: npm run build:all
      env:
        DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/atlasfleet_test?schema=public"
